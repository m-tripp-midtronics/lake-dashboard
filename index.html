<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lake & Beach — pH & Temperature Log</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0d1b2a;
    color: #e0eaf6;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a3a5c 0%, #0d2a45 100%);
    padding: 24px 32px;
    border-bottom: 2px solid #1e5f8a;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header .icon { font-size: 2rem; }
  header h1 { font-size: 1.6rem; font-weight: 600; letter-spacing: 0.5px; }
  header p { font-size: 0.85rem; color: #7fb3d3; margin-top: 2px; }
  header .header-right {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  #lastUpdated { font-size: 0.78rem; color: #7fb3d3; }

  .update-btn {
    background: linear-gradient(135deg, #1e5f8a, #2980b9);
    border: 1px solid #3498db;
    color: #fff;
    padding: 8px 18px;
    border-radius: 7px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s, transform 0.1s;
  }
  .update-btn:hover { background: linear-gradient(135deg, #2980b9, #3498db); transform: translateY(-1px); }
  .update-btn:active { transform: translateY(0); }
  #fileInput { display: none; }

  /* Toast notification */
  #toast {
    position: fixed;
    top: 20px; right: 20px;
    background: #1a5c3a;
    border: 1px solid #27ae60;
    color: #a8f0c0;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 1000;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { background: #5c1a1a; border-color: #e74c3c; color: #f0a8a8; }

  .controls {
    background: #132435;
    padding: 14px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid #1e3f5c;
  }
  .controls label { font-size: 0.8rem; color: #7fb3d3; margin-right: 4px; }
  .controls select, .controls button {
    background: #1a3a5c;
    border: 1px solid #2a5f8a;
    color: #e0eaf6;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .controls select:hover, .controls button:hover { background: #1e5f8a; }
  .controls button.active { background: #2980b9; border-color: #3498db; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 20px 32px;
  }
  .stat-card {
    background: #132435;
    border: 1px solid #1e3f5c;
    border-radius: 10px;
    padding: 16px 20px;
    text-align: center;
  }
  .stat-card .label { font-size: 0.75rem; color: #7fb3d3; text-transform: uppercase; letter-spacing: 0.8px; }
  .stat-card .value { font-size: 1.8rem; font-weight: 700; margin: 6px 0 2px; }
  .stat-card .sub { font-size: 0.75rem; color: #7fb3d3; }
  .ph-color { color: #52c4e0; }
  .temp-color { color: #f0a500; }
  .br-color { color: #3ec6a1; }
  .np-color { color: #e07052; }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 0 32px 20px;
  }
  .chart-card {
    background: #132435;
    border: 1px solid #1e3f5c;
    border-radius: 10px;
    padding: 20px;
  }
  .chart-card.full-width { grid-column: 1 / -1; }
  .chart-card h3 {
    font-size: 0.9rem;
    font-weight: 600;
    color: #7fb3d3;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
  }
  .chart-wrap { position: relative; height: 260px; }
  .chart-wrap.tall { height: 300px; }

  .table-wrap { padding: 0 32px 32px; }
  .table-wrap h3 {
    font-size: 0.9rem;
    font-weight: 600;
    color: #7fb3d3;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th {
    background: #1a3a5c;
    padding: 10px 14px;
    text-align: left;
    color: #7fb3d3;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  td { padding: 9px 14px; border-bottom: 1px solid #1e3f5c; }
  tr:hover td { background: #1a2d3e; }
  .morning td { background: rgba(30, 95, 138, 0.1); }
  .afternoon td { background: rgba(240, 165, 0, 0.05); }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .badge-am { background: #1a3a5c; color: #52c4e0; }
  .badge-pm { background: #3a2a00; color: #f0a500; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 32px;
    color: #7fb3d3;
  }
  .empty-state .big { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { margin-bottom: 20px; font-size: 0.95rem; }
</style>
</head>
<body>

<div id="toast"></div>
<input type="file" id="fileInput" accept=".xlsx,.xls" />

<header>
  <div class="icon">🌊</div>
  <div>
    <h1>Lake &amp; Beach — pH &amp; Temperature Log</h1>
    <p>Boat Ramp &amp; North Pier monitoring · MSC</p>
  </div>
  <div class="header-right">
    <button class="update-btn" onclick="document.getElementById('fileInput').click()">
      📂 Update Data
    </button>
    <span id="lastUpdated">No data loaded</span>
  </div>
</header>

<div class="controls">
  <div>
    <label>View</label>
    <button class="active" onclick="setView('all',event)">All Readings</button>
    <button onclick="setView('am',event)">Morning Only</button>
    <button onclick="setView('pm',event)">Afternoon Only</button>
  </div>
  <div style="margin-left:auto;">
    <label>Location</label>
    <button class="active" onclick="setLocation('both',event)">Both</button>
    <button onclick="setLocation('br',event)">Boat Ramp</button>
    <button onclick="setLocation('np',event)">North Pier</button>
  </div>
</div>

<div id="statsRow" class="stats-row"></div>
<div id="mainContent"></div>

<script>
// ── Seed data (last known snapshot) ─────────────────────────────────────────
const SEED = [
  {date:"2026-06-16",time:"7:19 AM", brPh:8.78, brTemp:70.5, npPh:8.87, npTemp:70.3},
  {date:"2026-06-16",time:"5:03 PM", brPh:9.01, brTemp:75.7, npPh:8.98, npTemp:73.9},
  {date:"2026-06-17",time:"7:13 AM", brPh:8.77, brTemp:71, npPh:8.89, npTemp:70.7},
  {date:"2026-06-17",time:"4:01 PM", brPh:8.78, brTemp:70.7, npPh:8.74, npTemp:69.9},
  {date:"2026-06-18",time:"8:46 AM", brPh:8.46, brTemp:68.9, npPh:8.58, npTemp:68.1},
  {date:"2026-06-19",time:"6:24 AM", brPh:8.57, brTemp:69.4, npPh:8.68, npTemp:69.2},
  {date:"2026-06-19",time:"6:06 PM", brPh:8.98, brTemp:73.5, npPh:9.05, npTemp:72.8},
  {date:"2026-06-20",time:"6:49 AM", brPh:8.72, brTemp:70.5, npPh:8.86, npTemp:70.3},
  {date:"2026-06-21",time:"8:17 AM", brPh:8.79, brTemp:71.2, npPh:8.91, npTemp:71.4},
  {date:"2026-06-22",time:"7:25 AM", brPh:8.55, brTemp:68.5, npPh:8.61, npTemp:69.2},
  {date:"2026-06-22",time:"5:30 PM", brPh:9.12, brTemp:73.4, npPh:8.74, npTemp:73},
  {date:"2026-06-23",time:"6:58 AM", brPh:8.78, brTemp:69.4, npPh:8.71, npTemp:70.1}
];

let RAW = [];
let currentView = 'all';
let currentLocation = 'both';
let charts = {};

// ── File loading ─────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, dateNF: 'yyyy-mm-dd' });
      const parsed = parseRows(rows);
      if (parsed.length === 0) throw new Error('No valid rows found');
      RAW = parsed;
      saveToStorage(RAW);
      document.getElementById('lastUpdated').textContent =
        'Updated from file · ' + new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
      updateAll();
      showToast('✓ Loaded ' + parsed.length + ' readings from ' + file.name);
    } catch(err) {
      showToast('⚠ Could not read file: ' + err.message, true);
    }
  };
  reader.readAsArrayBuffer(file);
  this.value = ''; // allow re-selecting same file
});

function parseRows(rows) {
  const result = [];
  // Skip header row(s) — find first row where col[0] looks like a date
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 6) continue;
    const rawDate = r[0], rawTime = r[1];
    const brPh = parseFloat(r[2]), brTemp = parseFloat(r[3]);
    const npPh = parseFloat(r[4]), npTemp = parseFloat(r[5]);
    if (isNaN(brPh) || isNaN(brTemp) || isNaN(npPh) || isNaN(npTemp)) continue;

    // Parse date — may come as Date object, serial, or string
    let dateStr;
    if (rawDate instanceof Date) {
      dateStr = rawDate.toISOString().slice(0, 10);
    } else if (typeof rawDate === 'number') {
      // Excel serial
      const d = XLSX.SSF.parse_date_code(rawDate);
      dateStr = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
    } else {
      // Try to parse string like "Tuesday, June 16, 2026"
      const d = new Date(String(rawDate));
      if (isNaN(d)) continue;
      dateStr = d.toISOString().slice(0, 10);
    }

    // Parse time string
    let timeStr = String(rawTime || '').trim();
    // Handle "7:19:00 AM" → "7:19 AM"
    timeStr = timeStr.replace(/^(\d+:\d+):\d+\s*(AM|PM)$/i, '$1 $2').toUpperCase();
    if (!timeStr) timeStr = '12:00 PM';

    result.push({ date: dateStr, time: timeStr, brPh, brTemp, npPh, npTemp });
  }
  return result;
}

// ── LocalStorage persistence ─────────────────────────────────────────────────
function saveToStorage(data) {
  try { localStorage.setItem('lakeData', JSON.stringify(data)); } catch(e) {}
}
function loadFromStorage() {
  try {
    const s = localStorage.getItem('lakeData');
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}

// ── Augment rows with computed fields ────────────────────────────────────────
function augment(data) {
  return data.map(r => {
    const parts = r.time.match(/^(\d+):(\d+)\s*(AM|PM)$/i);
    let hour = parts ? parseInt(parts[1]) : 12;
    const ampm = parts ? parts[3].toUpperCase() : 'AM';
    if (ampm === 'PM' && hour !== 12) hour += 12;
    if (ampm === 'AM' && hour === 12) hour = 0;
    return {
      ...r,
      session: hour < 12 ? 'AM' : 'PM',
      label: new Date(r.date + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + r.time
    };
  });
}

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => t.className = '', 3000);
}

// ── Filter helpers ───────────────────────────────────────────────────────────
function filteredData(data) {
  return data.filter(r => {
    if (currentView === 'am') return r.session === 'AM';
    if (currentView === 'pm') return r.session === 'PM';
    return true;
  });
}
function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }

// ── View / location toggles ──────────────────────────────────────────────────
function setView(v, e) {
  currentView = v;
  document.querySelectorAll('.controls .view-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  updateAll();
}
function setLocation(l, e) {
  currentLocation = l;
  document.querySelectorAll('.controls .loc-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  updateAll();
}

// ── Chart colors ─────────────────────────────────────────────────────────────
const C = {
  br: { ph:'#3ec6a1', temp:'#26a884', phFill:'rgba(62,198,161,0.15)', tempFill:'rgba(62,198,161,0.1)' },
  np: { ph:'#e07052', temp:'#c0503a', phFill:'rgba(224,112,82,0.15)', tempFill:'rgba(224,112,82,0.1)' },
};

const baseOpts = {
  responsive:true, maintainAspectRatio:false,
  plugins:{ legend:{labels:{color:'#b0cfe8',font:{size:12}}}, tooltip:{mode:'index',intersect:false} },
  scales:{
    x:{ticks:{color:'#7fb3d3',font:{size:10},maxRotation:30},grid:{color:'rgba(255,255,255,0.05)'}},
    y:{ticks:{color:'#7fb3d3'},grid:{color:'rgba(255,255,255,0.07)'}}
  },
  elements:{line:{tension:0.3,borderWidth:2},point:{radius:4,hoverRadius:6}}
};

function deepMerge(a, b) { return Object.assign({}, a, b); }

function makeOrUpdate(id, type, data, options) {
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id), { type, data, options });
}

// ── Build DOM ────────────────────────────────────────────────────────────────
function buildDOM() {
  document.getElementById('mainContent').innerHTML = `
    <div class="charts-grid">
      <div class="chart-card full-width">
        <h3>pH Over Time</h3>
        <div class="chart-wrap tall"><canvas id="phChart"></canvas></div>
      </div>
      <div class="chart-card full-width">
        <h3>Temperature Over Time (°F)</h3>
        <div class="chart-wrap tall"><canvas id="tempChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Morning vs Afternoon — pH</h3>
        <div class="chart-wrap"><canvas id="ampmPhChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Morning vs Afternoon — Temperature</h3>
        <div class="chart-wrap"><canvas id="ampmTempChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Boat Ramp vs North Pier — pH</h3>
        <div class="chart-wrap"><canvas id="locationPhChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Boat Ramp vs North Pier — Temperature</h3>
        <div class="chart-wrap"><canvas id="locationTempChart"></canvas></div>
      </div>
    </div>
    <div class="table-wrap">
      <h3>Raw Data</h3>
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Time</th><th>Session</th>
            <th>Boat Ramp pH</th><th>Boat Ramp Temp</th>
            <th>North Pier pH</th><th>North Pier Temp</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>`;
}

// ── Update functions ─────────────────────────────────────────────────────────
function updateStats(data) {
  const fd = filteredData(data);
  const brPh=fd.map(r=>r.brPh), npPh=fd.map(r=>r.npPh);
  const brTemp=fd.map(r=>r.brTemp), npTemp=fd.map(r=>r.npTemp);
  const allPh=[...brPh,...npPh], allTemp=[...brTemp,...npTemp];
  if (!allPh.length) { document.getElementById('statsRow').innerHTML=''; return; }
  document.getElementById('statsRow').innerHTML = [
    {label:'Avg pH', value:avg(allPh).toFixed(2), sub:`Range ${Math.min(...allPh).toFixed(2)}–${Math.max(...allPh).toFixed(2)}`, cls:'ph-color'},
    {label:'Avg Temp', value:avg(allTemp).toFixed(1)+'°', sub:`Range ${Math.min(...allTemp).toFixed(1)}–${Math.max(...allTemp).toFixed(1)}°F`, cls:'temp-color'},
    {label:'Boat Ramp pH', value:avg(brPh).toFixed(2), sub:`Temp avg ${avg(brTemp).toFixed(1)}°F`, cls:'br-color'},
    {label:'North Pier pH', value:avg(npPh).toFixed(2), sub:`Temp avg ${avg(npTemp).toFixed(1)}°F`, cls:'np-color'},
  ].map(s=>`<div class="stat-card"><div class="label">${s.label}</div><div class="value ${s.cls}">${s.value}</div><div class="sub">${s.sub}</div></div>`).join('');
}

function updateTimeSeries(data) {
  const fd = filteredData(data);
  const labels = fd.map(r=>r.label);

  function ds(type) {
    const sets = [];
    if (currentLocation !== 'np') sets.push({label:'Boat Ramp', data:fd.map(r=>type==='ph'?r.brPh:r.brTemp), borderColor:C.br[type], backgroundColor:C.br[type+'Fill'], fill:true});
    if (currentLocation !== 'br') sets.push({label:'North Pier', data:fd.map(r=>type==='ph'?r.npPh:r.npTemp), borderColor:C.np[type], backgroundColor:C.np[type+'Fill'], fill:true});
    return {labels, datasets:sets};
  }

  const xOpts = {...baseOpts.scales.x};
  makeOrUpdate('phChart','line', ds('ph'), {...baseOpts, scales:{x:xOpts, y:{min:8.2,max:9.3,ticks:{color:'#7fb3d3',callback:v=>v.toFixed(2)},grid:{color:'rgba(255,255,255,0.07)'}}}});
  makeOrUpdate('tempChart','line', ds('temp'), {...baseOpts, scales:{x:xOpts, y:{min:65,max:78,ticks:{color:'#7fb3d3',callback:v=>v+'°F'},grid:{color:'rgba(255,255,255,0.07)'}}}});
}

function updateAmPm(data) {
  const am = data.filter(r=>r.session==='AM'), pm = data.filter(r=>r.session==='PM');
  const locs = ['Boat Ramp','North Pier'];
  const barOpts = {responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#b0cfe8',font:{size:12}}}},scales:{x:{ticks:{color:'#7fb3d3'},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#7fb3d3'},grid:{color:'rgba(255,255,255,0.07)'}}}};

  makeOrUpdate('ampmPhChart','bar',{
    labels:locs,
    datasets:[
      {label:'Morning Avg', data:[avg(am.map(r=>r.brPh)),avg(am.map(r=>r.npPh))], backgroundColor:'rgba(82,196,224,0.7)',borderColor:'#52c4e0',borderWidth:1.5},
      {label:'Afternoon Avg', data:[avg(pm.map(r=>r.brPh)),avg(pm.map(r=>r.npPh))], backgroundColor:'rgba(240,165,0,0.7)',borderColor:'#f0a500',borderWidth:1.5},
    ]
  },{...barOpts,scales:{...barOpts.scales,y:{...barOpts.scales.y,min:8.3,ticks:{color:'#7fb3d3',callback:v=>v.toFixed(2)},grid:{color:'rgba(255,255,255,0.07)'}}}});

  makeOrUpdate('ampmTempChart','bar',{
    labels:locs,
    datasets:[
      {label:'Morning Avg', data:[avg(am.map(r=>r.brTemp)),avg(am.map(r=>r.npTemp))], backgroundColor:'rgba(82,196,224,0.7)',borderColor:'#52c4e0',borderWidth:1.5},
      {label:'Afternoon Avg', data:[avg(pm.map(r=>r.brTemp)),avg(pm.map(r=>r.npTemp))], backgroundColor:'rgba(240,165,0,0.7)',borderColor:'#f0a500',borderWidth:1.5},
    ]
  },{...barOpts,scales:{...barOpts.scales,y:{...barOpts.scales.y,min:65,ticks:{color:'#7fb3d3',callback:v=>v+'°F'},grid:{color:'rgba(255,255,255,0.07)'}}}});
}

function updateScatter(data) {
  const scatterOpts = {
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#b0cfe8',font:{size:12}}}},
    scales:{
      x:{ticks:{color:'#7fb3d3'},grid:{color:'rgba(255,255,255,0.05)'}},
      y:{ticks:{color:'#7fb3d3'},grid:{color:'rgba(255,255,255,0.07)'}}
    }
  };

  makeOrUpdate('locationPhChart','scatter',{
    datasets:[{label:'BR vs NP pH',data:data.map(r=>({x:r.brPh,y:r.npPh})),backgroundColor:'#52c4e0',pointRadius:6}]
  },{...scatterOpts,scales:{
    x:{...scatterOpts.scales.x,min:8.3,max:9.2,title:{display:true,text:'Boat Ramp pH',color:'#3ec6a1'},ticks:{color:'#7fb3d3',callback:v=>v.toFixed(2)},grid:{color:'rgba(255,255,255,0.05)'}},
    y:{...scatterOpts.scales.y,min:8.3,max:9.2,title:{display:true,text:'North Pier pH',color:'#e07052'},ticks:{color:'#7fb3d3',callback:v=>v.toFixed(2)},grid:{color:'rgba(255,255,255,0.07)'}}
  }});

  makeOrUpdate('locationTempChart','scatter',{
    datasets:[{label:'BR vs NP Temp',data:data.map(r=>({x:r.brTemp,y:r.npTemp})),backgroundColor:'#f0a500',pointRadius:6}]
  },{...scatterOpts,scales:{
    x:{...scatterOpts.scales.x,min:67,max:77,title:{display:true,text:'Boat Ramp (°F)',color:'#3ec6a1'},ticks:{color:'#7fb3d3',callback:v=>v+'°'},grid:{color:'rgba(255,255,255,0.05)'}},
    y:{...scatterOpts.scales.y,min:67,max:77,title:{display:true,text:'North Pier (°F)',color:'#e07052'},ticks:{color:'#7fb3d3',callback:v=>v+'°'},grid:{color:'rgba(255,255,255,0.07)'}}
  }});
}

function updateTable(data) {
  const fd = filteredData(data);
  document.getElementById('tableBody').innerHTML = fd.map(r=>`
    <tr class="${r.session==='AM'?'morning':'afternoon'}">
      <td>${new Date(r.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}</td>
      <td>${r.time}</td>
      <td><span class="badge ${r.session==='AM'?'badge-am':'badge-pm'}">${r.session==='AM'?'☀️ Morning':'🌤 Afternoon'}</span></td>
      <td style="color:#3ec6a1;font-weight:600">${r.brPh.toFixed(2)}</td>
      <td style="color:#f0a500">${r.brTemp.toFixed(1)}°F</td>
      <td style="color:#e07052;font-weight:600">${r.npPh.toFixed(2)}</td>
      <td style="color:#f0a500">${r.npTemp.toFixed(1)}°F</td>
    </tr>`).join('');
}

function updateAll() {
  const data = augment(RAW);
  updateStats(data);
  updateTimeSeries(data);
  updateAmPm(data);
  updateScatter(data);
  updateTable(data);
}

// ── Fix button onclick to pass event ─────────────────────────────────────────
document.querySelectorAll('.controls button').forEach(btn => {
  const orig = btn.getAttribute('onclick');
  if (orig && orig.includes('setView')) {
    const v = orig.match(/'(\w+)'/)[1];
    btn.removeAttribute('onclick');
    btn.classList.add('view-btn');
    btn.addEventListener('click', e => setView(v, e));
  }
  if (orig && orig.includes('setLocation')) {
    const l = orig.match(/'(\w+)'/)[1];
    btn.removeAttribute('onclick');
    btn.classList.add('loc-btn');
    btn.addEventListener('click', e => setLocation(l, e));
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
const stored = loadFromStorage();
if (stored && stored.length > 0) {
  RAW = stored;
  document.getElementById('lastUpdated').textContent = 'Loaded from last session · ' +
    new Date(RAW[RAW.length-1].date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
} else {
  RAW = SEED;
  document.getElementById('lastUpdated').textContent =
    'Showing built-in data · last reading ' +
    new Date(SEED[SEED.length-1].date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

buildDOM();
updateAll();
</script>
</body>
</html>
